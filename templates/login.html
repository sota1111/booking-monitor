<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - Booking Monitor</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 1.5rem; background: #eef1f4; color: #1c2430;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .card { background: white; border: 1px solid #e8eaed; border-radius: 16px; padding: 2rem; width: 100%;
            max-width: 380px; box-shadow: 0 12px 32px rgba(16,24,40,0.12); }
    .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
    .brand-mark { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px;
                  border-radius: 12px; margin-bottom: 0.75rem; font-size: 1.3rem;
                  background: linear-gradient(135deg, #3b82f6, #14b8a6); }
    h1 { margin: 0; font-size: 1.3rem; text-align: center; letter-spacing: -0.01em; }
    .brand p { margin: 0.35rem 0 0; color: #5b6472; font-size: 0.88rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.88rem; color: #1c2430; font-weight: 500; }
    input { width: 100%; box-sizing: border-box; padding: 0.6rem 0.8rem;
            border: 1px solid #d4d8df; border-radius: 8px; margin-bottom: 1rem; font-size: 1rem; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #e8f0fe; }
    button { width: 100%; padding: 0.7rem; background: #2563eb; color: white;
             border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #b91c1c; font-size: 0.88rem; margin-bottom: 1rem; background: #fdecec;
             border: 1px solid #f6c5c5; padding: 0.55rem 0.7rem; border-radius: 8px; }
  </style>
  <script src="/static/i18n.js" defer></script>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-mark">📅</span>
      <h1>Booking Monitor</h1>
      <p>ログインして監視を続ける</p>
    </div>
    <p id="error" class="error" style="display:none"></p>
    <form id="loginForm">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required autofocus placeholder="your-email@example.com">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" required>
      <input type="hidden" id="csrfToken" value="{{ csrf_token }}">
      <button type="submit" id="submitBtn">ログイン</button>
    </form>
  </div>
  <script>
    // 案1: server-side authentication. The browser POSTs the email/password to
    // our own /session endpoint, which verifies them via Firebase REST server-side.
    // No Firebase SDK runs in the browser.
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'ログイン中...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const csrfToken = document.getElementById('csrfToken').value;

      try {
        const res = await fetch('/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, csrf_token: csrfToken }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'メールアドレスまたはパスワードが正しくありません';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'ログインに失敗しました';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ログイン';
      }
    });
  </script>
</body>
</html>
